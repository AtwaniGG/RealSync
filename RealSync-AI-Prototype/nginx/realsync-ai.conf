upstream realsync_ai {
    server 127.0.0.1:5100;
    keepalive 4;
}

server {
    listen 80;
    server_name _;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    # SSL — replace with actual Let's Encrypt paths on production
    ssl_certificate     /etc/letsencrypt/live/realsync/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/realsync/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Match app-level limits: 2MB frame, 4MB audio
    client_max_body_size 5m;

    # Timeouts: 5s headroom over app's 30s INFERENCE_TIMEOUT_S
    proxy_read_timeout  35s;
    proxy_send_timeout  35s;
    proxy_connect_timeout 5s;

    location /api/health {
        proxy_pass http://realsync_ai;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://realsync_ai;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
